<svg xmlns="http://www.w3.org/2000/svg" width="7200" height="2400" viewBox="0 0 7200 2400">
  <title>Jugos Naturales Toñita at Latina Sweat Project</title>
  <desc>Six foot by two foot landscape restaurant-style juice menu board for Latina Sweat Project.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset in="blur" dx="0" dy="12" result="offset"/>
      <feComponentTransfer in="offset" result="shadow"><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sandWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf4"/>
      <stop offset="0.52" stop-color="#f5ede3"/>
      <stop offset="1" stop-color="#e8d8c2"/>
    </linearGradient>
    <linearGradient id="studioGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b5a18d" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffbd59" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- LSP's warm, organic brand foundation. -->
  <rect width="7200" height="2400" fill="url(#sandWash)"/>
  <rect width="2360" height="2400" fill="#1e1e1e"/>
  <rect width="7200" height="34" fill="#ffbd59"/>
  <rect x="2360" width="28" height="2400" fill="#b5a18d"/>

  <!-- Dark shop panel: the name, centered LSP mark, and a simple scan prompt. -->
  <circle cx="310" cy="2160" r="600" fill="url(#studioGlow)"/>
  <circle cx="2070" cy="2280" r="450" fill="#c7602d" opacity="0.13"/>
  <path d="M170 1510 C560 1435 1320 1435 2190 1530" fill="none" stroke="#ffbd59" stroke-width="10" stroke-linecap="round" opacity="0.48"/>

  <!-- Logo ground. The logo itself is composited from public/logo.png in the final print file. -->
  <circle cx="1180" cy="1090" r="390" fill="#f5ede3" filter="url(#softShadow)"/>
  <circle cx="1180" cy="1090" r="366" fill="none" stroke="#ffbd59" stroke-width="14"/>

  <!-- Rótulo-style shop name, with LSP's gold and teal used as offset paint layers. -->
  <g text-anchor="middle" font-family="Avenir Next, Avenir, Arial, sans-serif">
    <text x="1180" y="188" font-size="39" font-weight="800" letter-spacing="8" fill="#ffbd59">JUGOS NATURALES</text>
    <text x="1206" y="552" font-family="Rockwell, Rockwell Nova, Georgia, serif" font-size="275" font-weight="900" letter-spacing="-12" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="18" paint-order="stroke">TOÑITA</text>
    <text x="1190" y="536" font-family="Rockwell, Rockwell Nova, Georgia, serif" font-size="275" font-weight="900" letter-spacing="-12" fill="#0f766e" stroke="#1e1e1e" stroke-width="13" paint-order="stroke">TOÑITA</text>
    <text x="1178" y="521" font-family="Rockwell, Rockwell Nova, Georgia, serif" font-size="275" font-weight="900" letter-spacing="-12" fill="#ffbd59" stroke="#1e1e1e" stroke-width="10" paint-order="stroke">TOÑITA</text>
    <text x="1165" y="507" font-family="Rockwell, Rockwell Nova, Georgia, serif" font-size="275" font-weight="900" letter-spacing="-12" fill="#c7602d" stroke="#f5ede3" stroke-width="5" paint-order="stroke">TOÑITA</text>
    <text x="1165" y="507" font-family="Rockwell, Rockwell Nova, Georgia, serif" font-size="275" font-weight="900" letter-spacing="-12" fill="none" stroke="#1e1e1e" stroke-width="3">TOÑITA</text>
    <text x="1180" y="638" font-size="32" font-weight="800" letter-spacing="4" fill="#f5ede3">AT LATINA SWEAT PROJECT</text>
  </g>

  <!-- QR ground. The QR itself is composited from public/images/juice-menu-qr.png. -->
  <rect x="905" y="1570" width="550" height="550" rx="25" fill="#ffffff" filter="url(#softShadow)"/>
  <rect x="927" y="1592" width="506" height="506" rx="8" fill="none" stroke="#ffbd59" stroke-width="10"/>
  <g text-anchor="middle" font-family="Avenir Next, Avenir, Arial, sans-serif">
    <text x="1180" y="2218" font-size="43" font-weight="900" letter-spacing="3" fill="#f5ede3">SCAN FOR MENU, PRICES + PREPAY</text>
    <text x="1180" y="2282" font-size="30" font-weight="800" letter-spacing="3" fill="#ffbd59">JUGOS NATURALES TOÑITA</text>
  </g>

  <!-- Faint line-art ingredients in the menu background. -->
  <g fill="none" stroke="#b5a18d" stroke-width="18" opacity="0.17" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pineapple -->
    <path d="M6690 290 C6510 410 6495 680 6655 835 C6820 690 6850 420 6690 290Z"/>
    <path d="M6585 315 L6515 165 M6648 280 L6645 105 M6715 282 L6785 125 M6775 325 L6915 210"/>
    <path d="M6545 488 L6764 698 M6515 585 L6712 785 M6575 760 L6774 544 M6520 672 L6695 455"/>
    <!-- Lemon slice -->
    <circle cx="6795" cy="1270" r="265"/>
    <circle cx="6795" cy="1270" r="210"/>
    <path d="M6795 1060 V1480 M6585 1270 H7005 M6648 1123 L6942 1417 M6942 1123 L6648 1417"/>
    <!-- Carrot -->
    <path d="M6625 2060 C6790 1855 7000 1840 7125 1950 C6970 2180 6795 2280 6625 2060Z"/>
    <path d="M6745 1930 C6670 1850 6670 1785 6738 1723 M6820 1910 C6860 1817 6940 1795 7005 1838 M6780 1912 C6762 1800 6800 1735 6870 1686"/>
    <path d="M6740 2070 L6960 1960 M6788 2135 L7045 2010"/>
  </g>

  <!-- Menu header. -->
  <!-- Hand-painted rótulo accents stay restrained around the functional menu header. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2656 355 l22 54 l55 16 l-54 18 l-22 54 l-20 -54 l-55 -18 l54 -16z" fill="#ffbd59" stroke="#1e1e1e" stroke-width="7"/>
    <path d="M6290 290 l18 47 l48 16 l-47 17 l-19 48 l-17 -48 l-48 -17 l48 -16z" fill="#0f766e" stroke="#1e1e1e" stroke-width="7"/>
    <path d="M6354 530 q44 44 0 88 M6412 534 q44 44 0 88" stroke="#c7602d" stroke-width="12"/>
  </g>
  <g font-family="Avenir Next, Avenir, Arial, sans-serif">
    <text x="2850" y="274" font-size="43" font-weight="800" letter-spacing="10" fill="#c7602d">JUGOS NATURALES</text>
    <text x="2840" y="563" font-family="Rockwell, Rockwell Nova, Georgia, serif" font-size="218" font-weight="900" letter-spacing="-6" fill="#1e1e1e">MENÚ</text>
    <text x="3665" y="532" font-size="82" font-weight="900" letter-spacing="2" fill="#1e1e1e">JUICE MENU</text>
    <text x="3670" y="613" font-size="35" font-weight="700" letter-spacing="3" fill="#b5a18d">ENGLISH + ESPAÑOL INGREDIENTS</text>
    <path d="M2850 720 H6470" stroke="#1e1e1e" stroke-width="9"/>
    <path d="M2850 739 H5225" stroke="#ffbd59" stroke-width="14"/>
  </g>

  <!-- Four restaurant-style menu rows, Spanish first with English beneath. -->
  <g font-family="Avenir Next, Avenir, Arial, sans-serif">
    <!-- 01 -->
    <text x="2850" y="1034" font-size="74" font-weight="900" fill="#c7602d">01</text>
    <text x="3090" y="1028" font-size="78" font-weight="800" letter-spacing="1" fill="#1e1e1e">ZANAHORIA · PIÑA · LIMÓN</text>
    <text x="3094" y="1107" font-size="42" font-weight="600" letter-spacing="2" fill="#6b625a">carrot · pineapple · lemon</text>
    <path d="M2850 1164 H6460" stroke="#b5a18d" stroke-width="4" opacity="0.55"/>

    <!-- 02 -->
    <text x="2850" y="1370" font-size="74" font-weight="900" fill="#ffbd59">02</text>
    <text x="3090" y="1364" font-size="70" font-weight="800" letter-spacing="0.6" fill="#1e1e1e">PEPINO · APIO · ESPINACA · LIMÓN · PIÑA</text>
    <text x="3094" y="1443" font-size="42" font-weight="600" letter-spacing="1.8" fill="#6b625a">cucumber · celery · spinach · lemon · pineapple</text>
    <path d="M2850 1500 H6460" stroke="#b5a18d" stroke-width="4" opacity="0.55"/>

    <!-- 03 -->
    <text x="2850" y="1706" font-size="74" font-weight="900" fill="#c7602d">03</text>
    <text x="3090" y="1700" font-size="78" font-weight="800" letter-spacing="1" fill="#1e1e1e">FRESA · APIO · MANGO · LIMÓN</text>
    <text x="3094" y="1779" font-size="42" font-weight="600" letter-spacing="1.8" fill="#6b625a">strawberry · celery · mango · lemon</text>
    <path d="M2850 1836 H6460" stroke="#b5a18d" stroke-width="4" opacity="0.55"/>

    <!-- 04 -->
    <text x="2850" y="2042" font-size="74" font-weight="900" fill="#ffbd59">04</text>
    <text x="3090" y="2036" font-size="78" font-weight="800" letter-spacing="1" fill="#1e1e1e">MANGO · PIÑA · LIMÓN</text>
    <text x="3094" y="2115" font-size="42" font-weight="600" letter-spacing="1.8" fill="#6b625a">mango · pineapple · lemon</text>
  </g>

  <g font-family="Avenir Next, Avenir, Arial, sans-serif">
    <text x="2850" y="2300" font-size="35" font-weight="800" letter-spacing="6" fill="#c7602d">MENU / MENÚ</text>
    <text x="6460" y="2300" text-anchor="end" font-size="35" font-weight="700" letter-spacing="2" fill="#1e1e1e">REFUEL · RECONNECT · RESTORE</text>
  </g>
</svg>
