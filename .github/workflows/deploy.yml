name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
        env:
          PUBLIC_GEMINI_API_KEY: ${{ secrets.PUBLIC_GEMINI_API_KEY }}
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://jcseaxtvsozylsbmykka.supabase.co' }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_ByKQH4QqhYhrT7K-gqEhsw_zqdEvkB_' }}

      # Lets anything (including the rescue step below) check exactly which
      # commit the live site is serving: https://latinasweatproject.com/version.txt
      - name: Stamp build version
        run: echo "${GITHUB_SHA}" > dist/version.txt

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      # deploy-pages hard-caps its wait at 10 minutes, then cancels its own
      # deployment — but during Pages queue backlogs (2026-07-02: 20-75 min)
      # the deployment usually still lands afterwards, and once the cancel is
      # issued the status API stops reporting it. The live site is the only
      # trustworthy oracle: watch version.txt until this commit is serving.
      - name: Wait out slow Pages queue
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "deploy-pages gave up; watching the live site for this commit (up to 25 minutes)"
          for i in $(seq 1 100); do
            LIVE=$(curl -sf --max-time 10 "https://latinasweatproject.com/version.txt?rescue=${GITHUB_RUN_ID}-${i}" || echo unknown)
            echo "$(date -u +%H:%M:%S) live: ${LIVE:0:12} (want ${GITHUB_SHA:0:12})"
            if [ "$LIVE" = "$GITHUB_SHA" ]; then
              echo "Deployment landed despite the timeout."
              exit 0
            fi
            sleep 15
          done
          echo "This commit never went live. Retrigger with a fresh commit (same-SHA re-runs can read a cancelled state)."
          exit 1
