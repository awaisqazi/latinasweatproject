name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
        env:
          PUBLIC_GEMINI_API_KEY: ${{ secrets.PUBLIC_GEMINI_API_KEY }}
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://jcseaxtvsozylsbmykka.supabase.co' }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_ByKQH4QqhYhrT7K-gqEhsw_zqdEvkB_' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      # deploy-pages hard-caps its wait at 10 minutes, then cancels its own
      # deployment — but GitHub's Pages queue sometimes runs slower than that
      # and the cancel often loses the race, so the deployment still lands
      # minutes after the step "failed" (observed repeatedly 2026-07-02).
      # Same-SHA retries are useless (they instantly read the cancelled
      # state), so instead keep polling the deployment status and let the run
      # go green if the deployment makes it out of the queue.
      - name: Wait out slow Pages queue
        if: steps.deployment.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "deploy-pages gave up; polling the deployment for up to 20 more minutes"
          for i in $(seq 1 80); do
            STATUS=$(gh api "repos/${GITHUB_REPOSITORY}/pages/deployments/${GITHUB_SHA}" --jq .status 2>/dev/null || echo unknown)
            echo "$(date -u +%H:%M:%S) status: ${STATUS:-unknown}"
            case "$STATUS" in
              succeed)
                echo "Deployment landed despite the timeout."
                exit 0
                ;;
              deployment_failed|deployment_content_failed|deployment_attempt_error)
                echo "Deployment failed server-side."
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "Deployment never left the queue. Re-run this workflow (a fresh commit works best; same-SHA re-runs may read the cancelled state)."
          exit 1
